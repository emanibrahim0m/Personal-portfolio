<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link
      rel="icon"
      type="image/x-icon"
      href="./assets/images/icons/favicon-16x16.png"
    />
    <link rel="stylesheet" href="./assets/css/main.css" />
  </head>
  <body>
    <nav id="navigation" class="rounded-none"></nav>
    <main>
      <!-- Contact Section -->
      <section class="a-s-hero">
        <div class="a-s-hero-left flex-column">
          <span class="tag text-tag rounded-none">Get in touch</span>
          <h1 class="a-s-hero-head">Contact me</h1>
          <p class="contact-text">
            Ready to transform your complex business requirements into
            high-performance digital reality? Reach out today to discuss your
            next .NET project, and let’s start engineering your success story
            together.
          </p>
          <div class="contact-social flex-column">
            <a
              href="mailto:emanibrahim0m@gmail.com"
              class="social-link social-link-big"
              ><svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M4 4H20C21.1 4 22 4.9 22 6V18C22 19.1 21.1 20 20 20H4C2.9 20 2 19.1 2 18V6C2 4.9 2.9 4 4 4ZM20 8.07L12 13L4 8.07V18H20V8.07ZM20 6H4L12 11L20 6Z"
                  fill="currentColor"
                />
              </svg>
              emanibrahim0m@gmail.com</a
            >
            <a href="tel:+201069771169" class="social-link social-link-big"
              ><svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://w3.org"
              >
                <path
                  d="M6.62 10.79c1.44 2.82 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2Z"
                  fill="currentColor"
                />
              </svg>
              0106 977 1169</a
            >
            <a
              href="https://maps.app.goo.gl/CawL6iEPhDVqs5SQ9"
              class="social-link social-link-big"
              ><svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z"
                  fill="currentColor"
                />
              </svg>
              Cairo, Egypt</a
            >
          </div>
        </div>

        <div class="footer-newsletter flex-column rounded-corner">
          <div class="contact-form-top">
            <div class="contact-form-item flex-column">
              <label for="name" class="footer-form-heading">Name </label>
              <form class="footer-form">
                <input
                  id="name"
                  type="text"
                  class="footer-input rounded-black"
                  placeholder="Enter your name"
                />
              </form>
            </div>
            <div class="contact-form-item flex-column">
              <label for="email" class="footer-form-heading">Email </label>
              <form class="footer-form">
                <input
                  id="newsletter-email"
                  type="email"
                  name="email"
                  class="footer-input rounded-black"
                  placeholder="Enter your email"
                />
              </form>
            </div>
            <div class="contact-form-item flex-column">
              <label for="newsletter-email" class="footer-form-heading"
                >Phone
              </label>
              <form class="footer-form">
                <input
                  id="phone"
                  type="tel"
                  class="footer-input rounded-black"
                  placeholder="Enter your number"
                />
              </form>
            </div>
            <div class="contact-form-item flex-column">
              <label for="subject" class="footer-form-heading">Subject</label>
              <form class="footer-form">
                <input
                  id="subject"
                  type="text"
                  class="footer-input rounded-black"
                  placeholder="Enter Subject"
                  maxlength="256"
                  requiredf
                />
              </form>
            </div>
          </div>

          <div class="contact-form-bottom flex-column">
            <div class="contact-form-item flex-column">
              <label for="user-message" class="footer-form-heading"
                >Message
              </label>
              <textarea
                id="user-message"
                class="footer-input footer-input-full rounded-corner"
                placeholder="Type your message..."
              ></textarea>
            </div>
            <button type="submit" class="button button-primary rounded-none">
              submit
            </button>
          </div>
        </div>
      </section>
    </main>
    <div class="footer-container"></div>

    <!-- Scripts -->
    <script src="./assets/js/main.js"></script>
  </body>
</html>
